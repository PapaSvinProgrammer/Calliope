spring.application.name=radio-backend

# Database Configuration
# Default values work for local dev; override via env vars in Docker (SPRING_DATASOURCE_*)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/radio}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:radio}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:radio_secret}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080
# Bind to all interfaces so the app is reachable from outside the container
server.address=0.0.0.0

# Import secrets from separate file (application-secret.properties)
spring.config.import=optional:file:application-secret.properties
