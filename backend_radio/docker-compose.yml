services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radio-backend
    restart: unless-stopped
    ports:
      # Map container port 8080 to host port 8080
      # Change the left side if you need a different host port, e.g. "80:8080"
      - "8080:8080"
    # Use host network so the container can reach PostgreSQL on localhost:5432
    network_mode: host
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://localhost:5432/radio}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-radio}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-radio_secret}
